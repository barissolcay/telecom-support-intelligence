services:
  web:
    build: ./apps/web
    ports: ["8080:80"]
    depends_on:
      api: { condition: service_healthy }

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      STORAGE_BACKEND: database
      DATABASE_URL: postgresql+psycopg://telcoassist:telcoassist@postgres:5432/telcoassist
      QDRANT_URL: http://qdrant:6333
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: telcoassist
      POSTGRES_USER: telcoassist
      POSTGRES_PASSWORD: telcoassist
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcoassist"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    profiles: ["adapter"]
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

volumes:
  postgres_data:
  qdrant_data:
